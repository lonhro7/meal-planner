name: Update AME prices

# Runs Mon/Wed/Fri (19:00 UTC Sun/Tue/Thu ≈ early Mon/Wed/Fri morning AEST/AEDT).
# Scrapes Australian Meat Emporium, writes data/ame-prices.json, commits if
# changed. The push triggers Netlify to auto-deploy, and your phone updates itself.
on:
  schedule:
    - cron: "0 19 * * 0,2,4"
  workflow_dispatch: {}   # lets you also run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scrape AME prices
        run: python scripts/scrape_ame.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ame-prices.json
          if git diff --staged --quiet; then
            echo "No price changes."
          else
            git commit -m "Update AME prices ($(date -u +%F))"
            git push
          fi
