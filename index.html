<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2029" />
  <title>Family Meal Planner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meals" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app">
    <div>
      <h1>Family Meal Planner</h1>
      <div class="sub" id="subtitle">Rolling 4-week plan · metric · dinners</div>
    </div>
    <button class="btn small" id="offlineFlag" title="On-device — works offline">●</button>
  </header>

  <main>
    <section id="tab-plan"></section>
    <section id="tab-shopping" class="hidden"></section>
    <section id="tab-pantry" class="hidden"></section>
    <section id="tab-recipes" class="hidden"></section>
    <section id="tab-settings" class="hidden"></section>
  </main>

  <nav class="tabs">
    <button data-tab="plan" class="active"><span class="ic">🗓️</span>Plan</button>
    <button data-tab="shopping"><span class="ic">🛒</span>Shopping</button>
    <button data-tab="pantry"><span class="ic">🥩</span>Pantry</button>
    <button data-tab="recipes"><span class="ic">📖</span>Recipes</button>
    <button data-tab="settings"><span class="ic">⚙️</span>Settings</button>
  </nav>

  <div class="cook" id="cook">
    <header>
      <div class="t" id="cookTitle">Recipe</div>
      <div class="serves">
        <span class="small muted">Serves</span>
        <button class="btn small" id="servesDown">−</button>
        <span id="servesVal">4</span>
        <button class="btn small" id="servesUp">+</button>
        <button class="btn small" id="cookClose">✕</button>
      </div>
    </header>
    <div class="step-wrap">
      <div class="step-num" id="stepNum">Step 1</div>
      <div class="step-text" id="stepText"></div>
      <div class="step-ings"><h4>Ingredients for this step</h4><div id="stepIngs"></div></div>
    </div>
    <footer>
      <button class="btn" id="prevStep">◀ Back</button>
      <button class="btn primary" id="nextStep">Next ▶</button>
    </footer>
  </div>

  <div class="cook" id="recipeView">
    <header>
      <div class="t" id="rvTitle">Recipe</div>
      <button class="btn small" id="rvClose">✕</button>
    </header>
    <div class="step-wrap" id="rvBody"></div>
    <footer>
      <button class="btn" id="rvEdit">✎ Edit</button>
      <button class="btn primary" id="rvCook">👨‍🍳 Cook step-by-step</button>
    </footer>
  </div>

  <div class="cook" id="picker">
    <header>
      <div class="t" id="pickerTitle">Choose</div>
      <button class="btn small" id="pickerClose">✕</button>
    </header>
    <div class="picker-search" id="pickerSearchWrap"><input id="pickerSearch" type="text" placeholder="Search…" autocomplete="off"></div>
    <div id="pickerCreate"></div>
    <div class="step-wrap" id="pickerList" style="padding-top:8px"></div>
  </div>

  <div class="cook" id="recipeEdit">
    <header>
      <div class="t" id="editTitle">Edit recipe</div>
      <button class="btn small" id="editClose">✕</button>
    </header>
    <div class="step-wrap">
      <div class="row"><label class="f grow">Title<input id="e_title"></label></div>
      <div class="row"><label class="f">Prep min<input id="e_prep" type="number" style="width:80px"></label>
        <label class="f">Cook min<input id="e_cook" type="number" style="width:80px"></label>
        <label class="f">Serves<input id="e_serves" type="number" style="width:70px"></label></div>
      <div class="row"><label class="f">kJ/serve<input id="e_kj" type="number" style="width:90px"></label>
        <label class="f">Protein g<input id="e_prot" type="number" style="width:80px"></label>
        <label class="f">Carbs g<input id="e_carb" type="number" style="width:80px"></label>
        <label class="f">Fat g<input id="e_fat" type="number" style="width:80px"></label></div>
      <div class="row"><label class="f">Leftovers<select id="e_left">
          <option value="fresh">Best fresh</option><option value="ok">OK</option><option value="excellent">Excellent</option></select></label>
        <label class="f">Dairy<select id="e_dairy"><option value="free">Dairy-free</option><option value="replaceable">Replaceable</option><option value="required">Contains dairy</option></select></label></div>
      <div class="row"><label class="f grow">Tags (comma)<input id="e_tags"></label></div>
      <div class="row"><label class="f grow">Ingredients (one per line, e.g. "500 g beef mince")<textarea id="e_ings" rows="6" class="ta"></textarea></label></div>
      <div class="row"><label class="f grow">Method (one step per line)<textarea id="e_steps" rows="6" class="ta"></textarea></label></div>
    </div>
    <footer><button class="btn primary" id="editSave">Save recipe</button></footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="seed.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
